<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160" width="100%" role="img" aria-label="Jorge Otero  Argentina">
  <defs>
    <linearGradient id="skyFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="nameGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e6edf3"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0d1117" flood-opacity="0.45"/>
    </filter>
    <clipPath id="bannerClip">
      <rect width="1200" height="160" rx="8"/>
    </clipPath>
  </defs>

  <g clip-path="url(#bannerClip)">
    <!-- Celeste top stripe -->
    <g>
      <path fill="#74ACDF" d="M0,0 H1200 V53 L0,53 Z">
        <animate attributeName="d"
          dur="6s" repeatCount="indefinite"
          values="M0,0 H1200 V53 L0,53 Z;
                  M0,0 H1200 V56 Q600,48 0,53 Z;
                  M0,0 H1200 V53 L0,53 Z"/>
      </path>
    </g>

    <!-- White center stripe -->
    <g>
      <path fill="#FFFFFF" d="M0,53 H1200 V107 L0,107 Z">
        <animate attributeName="d"
          dur="7s" repeatCount="indefinite"
          values="M0,53 H1200 V107 L0,107 Z;
                  M0,56 H1200 V104 Q600,112 0,107 Z;
                  M0,53 H1200 V107 L0,107 Z"/>
      </path>
    </g>

    <!-- Celeste bottom stripe -->
    <g>
      <path fill="#6CACE4" d="M0,107 H1200 V160 L0,160 Z">
        <animate attributeName="d"
          dur="6.5s" repeatCount="indefinite"
          values="M0,107 H1200 V160 L0,160 Z;
                  M0,104 H1200 V160 Q600,152 0,160 Z;
                  M0,107 H1200 V160 L0,160 Z"/>
      </path>
    </g>

    <!-- Subtle Sol de Mayo -->
    <g transform="translate(600,80)" opacity="0.92">
      <circle r="22" fill="#F4B740" stroke="#E8A820" stroke-width="1.2">
        <animate attributeName="r" dur="5s" repeatCount="indefinite"
          values="22;23;22"/>
      </circle>
      <g stroke="#E8A820" stroke-width="1.4" stroke-linecap="round" opacity="0.85">
        <line x1="0" y1="-30" x2="0" y2="-36"/>
        <line x1="0" y1="30" x2="0" y2="36"/>
        <line x1="-30" y1="0" x2="-36" y2="0"/>
        <line x1="30" y1="0" x2="36" y2="0"/>
        <line x1="-21" y1="-21" x2="-25" y2="-25"/>
        <line x1="21" y1="21" x2="25" y2="25"/>
        <line x1="21" y1="-21" x2="25" y2="-25"/>
        <line x1="-21" y1="21" x2="-25" y2="25"/>
      </g>
      <g fill="#E8A820" opacity="0.9">
        <circle cx="0" cy="-34" r="1.6"/>
        <circle cx="0" cy="34" r="1.6"/>
        <circle cx="-34" cy="0" r="1.6"/>
        <circle cx="34" cy="0" r="1.6"/>
        <circle cx="-24" cy="-24" r="1.4"/>
        <circle cx="24" cy="24" r="1.4"/>
        <circle cx="24" cy="-24" r="1.4"/>
        <circle cx="-24" cy="24" r="1.4"/>
      </g>
      <g fill="#F7C948" opacity="0.55">
        <path d="M-8,-4 C-2,-10 6,-8 8,-2 C6,4 -2,6 -8,-4 Z"/>
        <path d="M-3,6 C2,10 8,8 9,3 C7,-1 1,-2 -3,6 Z"/>
        <path d="M-9,3 C-5,8 0,9 2,5 C0,1 -5,0 -9,3 Z"/>
      </g>
    </g>

    <!-- Subtle vignette for readability -->
    <rect width="1200" height="160" fill="url(#skyFade)"/>

    <!-- Name overlay -->
    <text x="600" y="72" text-anchor="middle"
      font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
      font-size="42" font-weight="700" fill="url(#nameGlow)" filter="url(#softShadow)"
      letter-spacing="1.5">Jorge Otero</text>
    <text x="600" y="102" text-anchor="middle"
      font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
      font-size="14" font-weight="500" fill="#c9d1d9" opacity="0.92"
      letter-spacing="3">BUENOS AIRES · ARGENTINA</text>
  </g>
</svg>
